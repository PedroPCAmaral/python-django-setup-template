<div class="author-card-large">
    <div class="author-avatar-lg">{{ autor.nome|slice:":2"|upper }}</div>
    <div>
        <span class="text-secondary text-uppercase font-monospace fw-bold" style="font-size: 0.75rem;">Escrito por</span>
        <h4 class="mt-1 mb-2 fw-bold text-white">{{ autor.nome }}</h4>
        <p class="text-text-muted mb-2 small">{{ autor.biografia|safe }}</p>
        <a href="mailto:{{ autor.email }}" class="btn btn-sm btn-outline-light mt-2">
            <i class="bi bi-envelope"></i> Contato: {{ autor.email }}
        </a>
    </div>
</div>
